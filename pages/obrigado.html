<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/assets/css/tokens.css">
<title>Mensagem enviada | iPhoneSmartphone</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--t1); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .card { background: var(--bg2); border: 1px solid var(--line); border-radius: 16px; padding: 3rem 2rem; text-align: center; max-width: 420px; width: 100%; }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem; }
  p { color: #aaa; margin-bottom: 1.5rem; line-height: 1.6; }
  a { display: inline-block; background: var(--blue); color: white; text-decoration: none; padding: 0.75rem 1.75rem; border-radius: 8px; font-weight: 700; font-size: 0.95rem; }
  a:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Mensagem enviada!</h1>
  <p>Recebemos seu contato. Respondemos em até 48 horas úteis pelo e-mail que você informou.</p>
  <a href="/">← Voltar ao site</a>
</div>
</body>
</html>
